name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'art/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'art/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        env:
          # A repository variable, not a secret — Umami website IDs are public
          # by design and ship in the page source. Unset on pull requests, so
          # PR builds never reach the dashboard.
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ github.event_name != 'pull_request' && vars.UMAMI_WEBSITE_ID || '' }}
        run: npm run build

      - name: Upload artifact
        # Only the push to main gets deployed; on a PR this job is just a build
        # check, so there is nothing to hand to the deploy job.
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
